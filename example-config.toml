# Dot Matrix 2.0 - Example Configuration File
# Copy this file to your config directory:
#   Linux/macOS: ~/.config/dotmatrix/config.toml
#   Windows: %APPDATA%\dotmatrix\config.toml
#
# Or run 'dmxcli init' to generate a default config.
#
# Note: Projects and tracked files are defined in manifest.toml,
# not in this config file. See example-manifest.toml for project setup.

# ═══════════════════════════════════════════════════════════════
# DATA DIRECTORY
# ═══════════════════════════════════════════════════════════════

# Custom data directory (optional)
# If not set, uses system default:
#   Linux: ~/.local/share/dotmatrix
#   Windows: %LOCALAPPDATA%\dotmatrix
#   macOS: ~/Library/Application Support/dotmatrix
# data_dir = "~/my-dotmatrix-data"

# ═══════════════════════════════════════════════════════════════
# BACKUP SETTINGS
# ═══════════════════════════════════════════════════════════════

# Default backup mode for new files: "incremental" or "archive"
#   incremental = Content-addressed storage (deduplication, efficient)
#   archive = Create timestamped archives (tar.gz, zip, or 7z)
default_backup_mode = "incremental"

# Default archive format (used when creating archive backups)
#   "targz" = tar.gz (default on Linux/macOS)
#   "zip" = ZIP archive (default on Windows)
#   "sevenz" = 7z archive
default_archive_format = "targz"

# Enable git versioning for project stores (recommended)
git_enabled = true

# ═══════════════════════════════════════════════════════════════
# INTERFACE SETTINGS
# ═══════════════════════════════════════════════════════════════

# Preferred interface when running without arguments
#   "auto" = Platform default (GUI on Windows, TUI on Linux/macOS)
#   "gui" = Always use GUI
#   "tui" = Always use TUI
preferred_interface = "auto"

# ═══════════════════════════════════════════════════════════════
# GLOBAL EXCLUDE PATTERNS
# ═══════════════════════════════════════════════════════════════

# Patterns to exclude from all projects
# Use glob syntax: *, **, ?
exclude = [
    "**/*.log",
    "**/.DS_Store",
    "**/node_modules/**",
    "**/.git/**",
    "**/__pycache__/**",
    "**/*.pyc",
    "**/Thumbs.db",
    "**/target/**",
]

# ═══════════════════════════════════════════════════════════════
# CLI ENCRYPTION FOR SCRIPTS AND CRON
# ═══════════════════════════════════════════════════════════════
#
# When using encrypted files with CLI commands (backup/restore),
# provide the password using one of these methods:
#
# 1. Password file (recommended for cron):
#    dmxcli backup --password-file ~/.dotmatrix-pass
#    Make sure to: chmod 600 ~/.dotmatrix-pass
#
# 2. Stdin (good for scripts):
#    echo "mypassword" | dmxcli backup --password-stdin
#    cat ~/.dotmatrix-pass | dmxcli restore --password-stdin
#
# 3. Environment variable (fallback):
#    export DOTMATRIX_PASSWORD="mypassword"
#    dmxcli backup
#
# Priority: stdin > password-file > environment variable
#
# Example cron job (daily backup at 2am):
#   0 2 * * * /usr/bin/dmxcli backup --password-file ~/.dotmatrix-pass -m "Scheduled backup"
